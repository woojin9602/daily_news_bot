name: Daily News Bot

on:
  schedule:
    # 19:23 UTC = KST 04:23. 일반적인 5~20분 지연을 감안하면 KST 04:30~05:00 도달 기대.
    # 정각(00분)은 cron 큐가 가장 혼잡해서 private repo가 심하게 밀린다 → non-zero 분으로 회피.
    - cron: '23 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-news-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run post_daily
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
        run: python post_daily.py

      - name: Persist state.json
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f state.json ]; then
            git add state.json
            if ! git diff --quiet --cached; then
              git commit -m "Update state.json [skip ci]"
              git push
            fi
          fi
